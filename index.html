<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>천원의 행복 - 어르신 급식 서비스</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="style.css">
    <!-- Google Tag Manager -->
    <script>(function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
    new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
    j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
    'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
    })(window,document,'script','dataLayer','GTM-5HL9FQXX');</script>
    <!-- End Google Tag Manager -->
</head>
<body>
    <div id="app">
        <!-- Google Tag Manager (noscript) -->
        <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-5HL9FQXX"
        height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
        <!-- End Google Tag Manager (noscript) -->

        <!-- ① 메인 화면 -->
        <section id="home-screen" class="screen">

            <!-- 앱 바 -->
            <header class="app-bar">
                <div class="app-bar-brand">
                    <span class="brand-emoji">🍱</span>
                    <div class="brand-texts">
                        <span class="brand-sub">어르신 급식 서비스</span>
                        <strong class="brand-name">천원의 행복</strong>
                    </div>
                </div>
                <div class="date-chip" id="today-date"></div>
            </header>

            <!-- 인사말 배너 -->
            <div class="greeting-bar">
                <span>🌿</span>
                <span>오늘도 건강하고 따뜻한 하루 되세요</span>
            </div>

            <!-- 히어로 배너 -->
            <div class="hero-wrap">
                <button class="hero-banner" onclick="navigateTo('menu-screen')">
                    <img class="hero-img"
                         src="ganjjajang.jpg"
                         alt="오늘의 메뉴">
                    <div class="hero-dim"></div>
                    <div class="hero-content">
                        <span class="hero-chip">🍱 오늘의 메뉴</span>
                        <h2 class="hero-title">삼선 간짜장</h2>
                        <p class="hero-desc">해물이 가득한 진한 짜장 한 그릇</p>
                        <div class="hero-cta">메뉴 보러가기 <span>→</span></div>
                    </div>
                </button>
            </div>

            <!-- 섹션 구분 -->
            <div class="section-divider"></div>

            <!-- 빠른 메뉴 -->
            <div class="section">
                <div class="section-head">
                    <h2 class="section-title">빠른 메뉴</h2>
                </div>
                <div class="category-grid">
                    <button class="cat-item" onclick="showMsg('오늘 식사가 예약되었습니다!')">
                        <div class="cat-icon booking">📅</div>
                        <span class="cat-label">식사 예약</span>
                    </button>
                    <button class="cat-item" onclick="showMsg('식권이 발행되었습니다.')">
                        <div class="cat-icon ticket">🎟️</div>
                        <span class="cat-label">식권 발행</span>
                    </button>
                    <button class="cat-item" onclick="showMsg('오늘 식사를 선물했습니다!')">
                        <div class="cat-icon share">🔥</div>
                        <span class="cat-label">식사 쏘기</span>
                    </button>
                    <button class="cat-item" onclick="showMsg('기부 페이지로 이동합니다.')">
                        <div class="cat-icon donate">🎁</div>
                        <span class="cat-label">기부하기</span>
                    </button>
                </div>
            </div>

            <!-- 섹션 구분 -->
            <div class="section-divider"></div>

            <!-- 더보기 -->
            <div class="section">
                <div class="section-head">
                    <h2 class="section-title">더보기</h2>
                </div>
                <div class="more-list">
                    <button class="more-row" onclick="showMsg('위치 정보를 준비 중입니다.')">
                        <div class="more-row-icon location">📍</div>
                        <div class="more-row-text">
                            <span class="more-row-title">급식소 위치 안내</span>
                            <span class="more-row-desc">가까운 급식소를 찾아보세요</span>
                        </div>
                        <span class="more-row-arrow">›</span>
                    </button>
                    <button class="more-row" onclick="showMsg('함께하는 분들을 소개합니다.')">
                        <div class="more-row-icon together">🤝</div>
                        <div class="more-row-text">
                            <span class="more-row-title">함께하는 사람들</span>
                            <span class="more-row-desc">봉사자와 참여자를 소개합니다</span>
                        </div>
                        <span class="more-row-arrow">›</span>
                    </button>
                    <button class="more-row" onclick="showMsg('후원해주시는 감사한 분들입니다.')">
                        <div class="more-row-icon sponsor">❤️</div>
                        <div class="more-row-text">
                            <span class="more-row-title">후원하는 사람들</span>
                            <span class="more-row-desc">감사한 후원자분들을 소개합니다</span>
                        </div>
                        <span class="more-row-arrow">›</span>
                    </button>
                </div>
            </div>

            <div class="tab-spacer"></div>
        </section>

        <!-- ② 오늘의 메뉴 화면 -->
        <section id="menu-screen" class="screen hidden">
            <header class="sub-header">
                <button class="back-btn" onclick="navigateTo('home-screen')">← 뒤로</button>
                <h2>오늘의 메뉴</h2>
            </header>
            <div class="food-container">
                <article class="food-card">
                    <div class="food-img" style="background-image: url('ganjjajang.jpg')"></div>
                    <div class="food-info">
                        <h3>삼선 간짜장</h3>
                        <p>새우·오징어·해삼이 어우러진 진한 짜장 소스!</p>
                        <div class="card-btns">
                            <button class="btn-sm" onclick="showMsg('삼선 간짜장 예약 완료!')">예약하기</button>
                            <button class="btn-sm gift" onclick="showMsg('삼선 간짜장 한 그릇 쐈습니다!')">음식 쏘기</button>
                        </div>
                    </div>
                </article>
            </div>
        </section>

    </div>

    <!-- 탭 바 -->
    <nav class="tab-bar">
        <button class="tab-item active" onclick="navigateTo('home-screen')">
            <span class="tab-icon">🏠</span>
            <span class="tab-label">홈</span>
        </button>
        <button class="tab-item" onclick="navigateTo('menu-screen')">
            <span class="tab-icon">🍱</span>
            <span class="tab-label">메뉴</span>
        </button>
        <button class="tab-item" onclick="showMsg('예약 내역을 준비 중입니다.')">
            <span class="tab-icon">📋</span>
            <span class="tab-label">예약 내역</span>
        </button>
        <button class="tab-item" onclick="showMsg('내 정보 페이지를 준비 중입니다.')">
            <span class="tab-icon">👤</span>
            <span class="tab-label">내 정보</span>
        </button>
    </nav>

    <div id="toast" class="toast hidden"></div>
    <script src="main.js"></script>
</body>
</html>
